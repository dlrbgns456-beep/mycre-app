# Netlify 배포 설정
# 웹 코드는 www/ 폴더에 있음 (Capacitor 표준 구조)
# byetmaru-capacitor 와 통합 후 단일 저장소 구조

[build]
  publish = "www"

# 캐시 헤더 — index.html은 항상 최신, 정적 자산은 1년 캐시
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
